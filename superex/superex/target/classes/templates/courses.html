<div style="max-width: 900px; margin: 20px auto; font-family: Arial, sans-serif;">


	
    <!-- Header with Logout -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color: #2c3e50; margin: 0;">Available Courses</h2>

		<!-- TOP MENU -->
				<div style="background:#2c3e50; padding:10px; border-radius:8px; margin-bottom:20px;">
				    <a href="/courses" style="color:white; margin-right:15px;">Home</a>
				    <a href="/profile" style="color:white; margin-right:15px;">User Profile</a>
				    <a href="/ewallet" style="color:white; margin-right:15px;">E-Wallet</a>
				    <a href="/myplan" style="color:white; margin-right:15px;">My Plan</a>
				    <a href="/transactions" style="color:white;">Transactions</a>
				</div>
		
        <!-- Logout Button -->
        <form method="get" action="/logout" style="margin: 0;">
            <button type="submit"
                    style="background-color: #dc3545; color: white; border: none; 
                           padding: 8px 16px; border-radius: 5px; cursor: pointer;">
                Logout
            </button>
        </form>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(courses)}" style="text-align:center; color: #888;">
        No courses available at the moment.
    </div>

    <!-- Course Card -->
    <div th:each="c : ${courses}" 
         style="padding: 20px; margin: 15px 0; border: 1px solid #ddd; 
                border-radius: 10px; background-color: #f9f9f9;">

        <!-- Course Name -->
        <h3 style="margin: 0; color: #2c3e50;">
            <strong>Course Name:</strong>
            <span th:text="${c.name}">Course Name</span>
        </h3>

        <!-- Description -->
        <p style="color: #555; margin: 10px 0;">
            <strong>Course Description:</strong>
            <span th:text="${c.description}">Course Description</span>
        </p>

        <!-- Price Section -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
            
            <div style="font-size: 16px; font-weight: 500; color: #333;">
                <strong>Price:</strong> 
                ₹<span th:text="${c.price}">0</span>
            </div>

            <!-- Buy Form -->
            <form method="post" action="/payment" style="margin: 0;">
                <input type="hidden" name="courseId" th:value="${c.id}" />
                <button type="submit"
                        style="background-color: #007bff; color: white; border: none; 
                               padding: 8px 16px; border-radius: 5px; cursor: pointer;">
                    Buy Now
                </button>
            </form>
        </div>
    </div>
</div>
