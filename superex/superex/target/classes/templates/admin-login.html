<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - SuperEx</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }
    </style>
</head>

<body>

<div class="login-container">
    <h2>Admin Login</h2>

    <form method="post" action="/admin/login">
        
        <div class="form-group">
            <label>Email</label>
            <input name="email" type="text" placeholder="Enter email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input name="password" type="password" placeholder="Enter password" required>
        </div>

        <button type="submit">Login</button>

    </form>
</div>

</body>
</html>
