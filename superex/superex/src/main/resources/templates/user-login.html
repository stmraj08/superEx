<!DOCTYPE html>
<html>
<head>
    <title>Login - SuperEx</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            border: none;
            color: white;
            border-radius: 6px;
            margin-top: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .link {
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>User Login</h2>

	<div style="color:green;" th:if="${param.success}">
	    <span th:text="${param.success}"></span>
	</div>
	
    <form method="post" action="/user/login">
        <div class="form-group">
            <label>Email</label>
            <input name="email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input name="password" type="password" required>
        </div>

        <button>Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="/register">Register here</a>
    </div>
</div>

</body>
</html>
