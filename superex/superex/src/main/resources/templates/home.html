<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SuperEx - Home</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            color: #333;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            text-decoration: none;
            font-size: 16px;
            border-radius: 6px;
            color: white;
            transition: 0.3s ease;
        }

        .admin {
            background-color: #007bff;
        }

        .admin:hover {
            background-color: #0056b3;
        }

        .user {
            background-color: #28a745;
        }

        .user:hover {
            background-color: #1e7e34;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Welcome to Super-Ex</h2>

    <a href="/admin" class="btn admin">Admin</a>
    <a href="/user" class="btn user">User</a>
</div>

</body>
</html>
